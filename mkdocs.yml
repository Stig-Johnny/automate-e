site_name: Automate-E
site_description: Kubernetes-native AI agent runtime for Discord
site_url: https://stig-johnny.github.io/automate-e/
repo_url: https://github.com/Stig-Johnny/automate-e
repo_name: Stig-Johnny/automate-e

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Getting Started:
    - Quick Start: quickstart.md
    - Discord Bot Setup: discord-setup.md
    - Configuration: configuration.md
  - Reference:
    - Architecture: architecture.md
    - Deployment: deployment.md
    - Dashboard: dashboard.md
    - Memory: memory.md
    - Usage Tracking: usage-tracking.md

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

strict: true
