replicaCount: 1

image:
  repository: ghcr.io/stig-johnny/automate-e
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# Inline character.json — the agent's personality, tools, and config
character: {}

redis:
  enabled: false
  url: ""

dashboard:
  enabled: true
  port: 3000

tunnel:
  enabled: false
  tokenSecretName: ""
  hostname: ""

# Set existingSecret to use a pre-created secret, or provide values inline
secrets:
  existingSecret: ""
  discordBotToken: ""
  anthropicApiKey: ""
  databaseUrl: ""

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 500m
