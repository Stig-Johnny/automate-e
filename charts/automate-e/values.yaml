# "single" (default) or "split" (gateway+workers)
mode: single

image:
  repository: ghcr.io/stig-johnny/automate-e
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

# Inline character.json — the agent's personality, tools, and config
character: {}

# Gateway+worker mode: enable Redis for message queue
redis:
  enabled: false
  url: ""
  # Deploy a Redis instance alongside the agent
  deploy: false
  storage: 1Gi
  storageClass: ""

# Worker replicas (only used in split mode)
workers:
  replicas: 2

dashboard:
  enabled: true
  port: 3000

tunnel:
  enabled: false
  tokenSecretName: ""
  hostname: ""

# Use existingSecret to reference a pre-created secret, or provide values inline
secrets:
  existingSecret: ""
  discordBotToken: ""
  anthropicApiKey: ""
  openaiApiKey: ""
  databaseUrl: ""

# Cron: deploy an additional CronJob that runs the agent prompt on schedule.
# Works with any mode — the CronJob shares the same character, secrets, and database.
cron:
  enabled: false
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

# Extra environment variables (for MCP servers, custom integrations, etc.)
extraEnv: []
# Example:
#   - name: GITHUB_PERSONAL_ACCESS_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: github-token

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 500m
