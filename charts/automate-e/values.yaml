# "single" (default), "split" (gateway+workers), or "cron" (scheduled one-shot)
mode: single

image:
  repository: ghcr.io/stig-johnny/automate-e
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

# Inline character.json — the agent's personality, tools, and config
character: {}

# Gateway+worker mode: enable Redis for message queue
redis:
  enabled: false
  url: ""
  # Deploy a Redis instance alongside the agent
  deploy: false
  storage: 1Gi
  storageClass: ""

# Worker replicas (only used in split mode)
workers:
  replicas: 2

dashboard:
  enabled: true
  port: 3000

tunnel:
  enabled: false
  tokenSecretName: ""
  hostname: ""

# Use existingSecret to reference a pre-created secret, or provide values inline
secrets:
  existingSecret: ""
  discordBotToken: ""
  anthropicApiKey: ""
  databaseUrl: ""

# Cron mode settings (only used when mode: cron)
cron:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 500m
