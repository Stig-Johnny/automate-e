{{- if eq .Values.mode "single" }}
# Single-process mode: one deployment handles Discord + agent loop
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automate-e.fullname" . }}
  labels:
    {{- include "automate-e.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "automate-e.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automate-e.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if eq (default "discord" .Values.messagingPlatform) "discord" }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: discord-bot-token
            {{- else if eq .Values.messagingPlatform "slack" }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: slack-bot-token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: slack-app-token
            {{- end }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: openai-api-key
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: database-url
            {{- if .Values.codexHomePersistence.enabled }}
            - name: CODEX_HOME
              value: {{ .Values.codexHomePersistence.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
            {{- if .Values.codexHomePersistence.enabled }}
            - name: codex-home
              mountPath: {{ .Values.codexHomePersistence.mountPath }}
            {{- end }}
          {{- if .Values.dashboard.enabled }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: character
          configMap:
            name: {{ include "automate-e.fullname" . }}-character
        {{- if .Values.codexHomePersistence.enabled }}
        - name: codex-home
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-codex-home" (include "automate-e.fullname" .)) .Values.codexHomePersistence.existingClaim }}
        {{- end }}
{{- else }}
# Gateway+Worker mode: gateway handles Discord, workers process messages via Redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automate-e.fullname" . }}-gateway
  labels:
    {{- include "automate-e.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "automate-e.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "automate-e.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "src/gateway.js"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: discord-bot-token
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- if .Values.codexHomePersistence.enabled }}
            - name: CODEX_HOME
              value: {{ .Values.codexHomePersistence.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
            {{- if .Values.codexHomePersistence.enabled }}
            - name: codex-home
              mountPath: {{ .Values.codexHomePersistence.mountPath }}
            {{- end }}
          {{- if .Values.dashboard.enabled }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: character
          configMap:
            name: {{ include "automate-e.fullname" . }}-character
        {{- if .Values.codexHomePersistence.enabled }}
        - name: codex-home
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-codex-home" (include "automate-e.fullname" .)) .Values.codexHomePersistence.existingClaim }}
        {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automate-e.fullname" . }}-worker
  labels:
    {{- include "automate-e.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.workers.replicas }}
  selector:
    matchLabels:
      {{- include "automate-e.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "automate-e.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "src/worker.js"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: discord-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: openai-api-key
                  optional: true
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "automate-e.secretName" . }}
                      key: database-url
                {{- if .Values.codexHomePersistence.enabled }}
                - name: CODEX_HOME
                  value: {{ .Values.codexHomePersistence.mountPath | quote }}
                {{- end }}
                - name: REDIS_URL
                  value: {{ .Values.redis.url | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
            {{- if .Values.codexHomePersistence.enabled }}
            - name: codex-home
              mountPath: {{ .Values.codexHomePersistence.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: character
          configMap:
            name: {{ include "automate-e.fullname" . }}-character
        {{- if .Values.codexHomePersistence.enabled }}
        - name: codex-home
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-codex-home" (include "automate-e.fullname" .)) .Values.codexHomePersistence.existingClaim }}
        {{- end }}
{{- end }}
---
{{- if .Values.cron.enabled }}
# Cron: runs agent prompt on schedule (can coexist with single/split Discord bot)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "automate-e.fullname" . }}-cron
  labels:
    {{- include "automate-e.labels" . | nindent 4 }}
    app.kubernetes.io/component: cron
spec:
  schedule: {{ .Values.cron.schedule | quote }}
  concurrencyPolicy: {{ .Values.cron.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cron.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cron.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "automate-e.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: cron
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
            - name: agent
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["node", "src/run-once.js"]
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "automate-e.secretName" . }}
                      key: anthropic-api-key
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "automate-e.secretName" . }}
                      key: openai-api-key
                      optional: true
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "automate-e.secretName" . }}
                      key: database-url
                      optional: true
                {{- if .Values.codexHomePersistence.enabled }}
                - name: CODEX_HOME
                  value: {{ .Values.codexHomePersistence.mountPath | quote }}
                {{- end }}
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "automate-e.secretName" . }}
                      key: discord-webhook-url
                      optional: true
                {{- with .Values.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              volumeMounts:
                - name: character
                  mountPath: /config
                  readOnly: true
                {{- if .Values.codexHomePersistence.enabled }}
                - name: codex-home
                  mountPath: {{ .Values.codexHomePersistence.mountPath }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: character
              configMap:
                name: {{ include "automate-e.fullname" . }}-character
            {{- if .Values.codexHomePersistence.enabled }}
            - name: codex-home
              persistentVolumeClaim:
                claimName: {{ default (printf "%s-codex-home" (include "automate-e.fullname" .)) .Values.codexHomePersistence.existingClaim }}
            {{- end }}
{{- end }}
