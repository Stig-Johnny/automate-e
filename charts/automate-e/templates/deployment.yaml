apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automate-e.fullname" . }}
  labels:
    {{- include "automate-e.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "automate-e.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automate-e.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: discord-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: anthropic-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "automate-e.secretName" . }}
                  key: database-url
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
          {{- if .Values.dashboard.enabled }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: character
          configMap:
            name: {{ include "automate-e.fullname" . }}-character
