# Template — seal with kubeseal before applying.
#
# Required secrets:
#   discord-bot-token: Book-E Discord bot token
#   anthropic-api-key: Anthropic API key for Claude
#   database-url: Postgres connection string (shared with ai-accountant)
#
# To create:
#   kubectl create secret generic book-e-secrets \
#     --namespace automate-e \
#     --from-literal=discord-bot-token=<token> \
#     --from-literal=anthropic-api-key=<key> \
#     --from-literal=database-url='postgresql://postgres:<password>@postgres.ai-accountant.svc.cluster.local:5432/ai_accountant' \
#     --dry-run=client -o yaml | kubeseal --format yaml > sealed-secrets.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: book-e-secrets
  namespace: automate-e
spec:
  encryptedData: {}
  template:
    metadata:
      name: book-e-secrets
      namespace: automate-e
