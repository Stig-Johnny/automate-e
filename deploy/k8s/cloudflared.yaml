# Cloudflare Tunnel connector for automate-e dashboard
# Routes book-e.dashecorp.com → Book-E dashboard (port 3000)
# Tunnel token stored as secret: cloudflared-automate-e-token (created manually)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: automate-e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-automate-e-token
                  key: token
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
