apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-e
  namespace: automate-e
  labels:
    app: book-e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-e
  template:
    metadata:
      labels:
        app: book-e
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: book-e
          image: ghcr.io/stig-johnny/automate-e:latest
          imagePullPolicy: Always
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: discord-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: anthropic-api-key
            - name: ACCOUNTING_API_URL
              value: "http://ai-accountant-api.ai-accountant.svc.cluster.local"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: database-url
            # Optional: set REDIS_URL to enable gateway/worker split mode
            # When set, deploy separate gateway + worker pods instead of this single deployment
            # - name: REDIS_URL
            #   value: "redis://redis.automate-e.svc.cluster.local:6379"
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: character
          configMap:
            name: book-e-character
