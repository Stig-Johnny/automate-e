apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-e
  namespace: automate-e
  labels:
    app: book-e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-e
  template:
    metadata:
      labels:
        app: book-e
    spec:
      containers:
        - name: book-e
          image: ghcr.io/stig-johnny/automate-e:latest
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: discord-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: anthropic-api-key
            - name: ACCOUNTING_API_URL
              value: "http://ai-accountant-api.ai-accountant.svc.cluster.local"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: database-url
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
