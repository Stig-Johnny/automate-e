name: Build & Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile*'
      - 'charts/**'
      - '.github/workflows/build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/stig-johnny/automate-e
  SHA_TAG: sha-${{ github.sha }}

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ env.SHA_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build default image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.SHA_TAG }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ${{ env.IMAGE }}:base
            ${{ env.IMAGE }}:base-${{ env.SHA_TAG }}

  build-stacks:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.node
            tag: node
          - dockerfile: Dockerfile.dotnet
            tag: dotnet
          - dockerfile: Dockerfile.python
            tag: python
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build stack image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ matrix.tag }}
            ${{ env.IMAGE }}:${{ matrix.tag }}-${{ env.SHA_TAG }}

  update-gitops:
    needs: build-stacks
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update rig-gitops image tags
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          SHA_TAG="sha-${{ github.sha }}"

          update_tag() {
            local FILE="$1" OLD_TAG="$2" NEW_TAG="$3"
            echo "Updating $FILE: $OLD_TAG → $NEW_TAG"

            # Fetch current file
            RESPONSE=$(gh api "repos/Stig-Johnny/rig-gitops/contents/$FILE" 2>&1) || {
              echo "Failed to fetch $FILE: $RESPONSE"
              return 1
            }

            FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
            CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)

            # Replace tag
            UPDATED=$(echo "$CONTENT" | sed "s/tag: ${OLD_TAG}.*/tag: ${NEW_TAG}/")
            if [ "$CONTENT" = "$UPDATED" ]; then
              echo "No change needed for $FILE"
              return 0
            fi

            # Push update
            ENCODED=$(echo "$UPDATED" | base64 | tr -d '\n')
            gh api "repos/Stig-Johnny/rig-gitops/contents/$FILE" \
              -X PUT \
              -f message="chore: pin $OLD_TAG to $NEW_TAG" \
              -f content="$ENCODED" \
              -f sha="$FILE_SHA" \
              -f branch="main" \
              --silent || echo "Failed to update $FILE"
          }

          update_tag "apps/dev-e/automate-e-helmrelease.yaml" "node" "node-${SHA_TAG}"
          update_tag "apps/dev-e/dotnet-helmrelease.yaml" "dotnet" "dotnet-${SHA_TAG}"
          update_tag "apps/dev-e/python-helmrelease.yaml" "python" "python-${SHA_TAG}"

          echo "Done."
