name: Build & Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/stig-johnny/automate-e

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.primary_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          safe_ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/_' '--' | tr -cd 'a-z0-9.-')"

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            primary_tag="${short_sha}"
            {
              echo "primary_tag=${primary_tag}"
              echo 'tags<<EOF'
              echo "${IMAGE}:latest"
              echo "${IMAGE}:${primary_tag}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            primary_tag="${safe_ref}-${short_sha}"
            {
              echo "primary_tag=${primary_tag}"
              echo 'tags<<EOF'
              echo "${IMAGE}:${primary_tag}"
              echo "${IMAGE}:${short_sha}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
