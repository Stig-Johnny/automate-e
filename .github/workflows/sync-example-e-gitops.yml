name: Sync Example-E GitOps

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]

jobs:
  sync-gitops:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'feature/codex-cli-provider-example-e'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compute image and revision metadata
        id: meta
        shell: bash
        run: |
          head_sha="${{ github.event.workflow_run.head_sha }}"
          short_sha="${head_sha::12}"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout cluster-gitops
        uses: actions/checkout@v4
        with:
          repository: Stig-Johnny/cluster-gitops
          ref: feature/example-e-codex-k8s-login
          token: ${{ secrets.CLUSTER_GITOPS_PAT }}
          path: cluster-gitops

      - name: Update example-e Argo app
        shell: bash
        run: |
          file="cluster-gitops/apps/example-e-argocd.yaml"
          perl -0pi -e 's#targetRevision: .*?\n    path: charts/automate-e#targetRevision: '"${{ steps.meta.outputs.head_sha }}"'\n    path: charts/automate-e#' "$file"
          perl -0pi -e 's#(name: image\.tag\n\s+value: ).*#$1'"${{ steps.meta.outputs.short_sha }}"'#' "$file"

      - name: Commit and push if changed
        shell: bash
        run: |
          cd cluster-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No gitops changes needed."
            exit 0
          fi
          git add apps/example-e-argocd.yaml
          git commit -m "chore: sync example-e to automate-e ${{ steps.meta.outputs.short_sha }}"
          git push origin HEAD:feature/example-e-codex-k8s-login
