apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-e-api
  namespace: example-e
  labels:
    app: example-e-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-e-api
  template:
    metadata:
      labels:
        app: example-e-api
    spec:
      containers:
        - name: api
          image: ghcr.io/stig-johnny/example-e-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: example-e-api
  namespace: example-e
  labels:
    app: example-e-api
spec:
  selector:
    app: example-e-api
  ports:
    - port: 8080
      targetPort: 8080
