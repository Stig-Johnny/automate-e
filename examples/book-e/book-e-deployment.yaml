# Gateway — 1 replica (Discord allows one gateway connection per bot token)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-e-gateway
  namespace: automate-e
  labels:
    app: book-e-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-e-gateway
  template:
    metadata:
      labels:
        app: book-e-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: gateway
          image: ghcr.io/stig-johnny/automate-e:a31e1f54fccf5727c353df2a8da6075b847e7bf1
          imagePullPolicy: Always
          command: ["node", "src/gateway.js"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: discord-bot-token
            - name: REDIS_URL
              value: "redis://redis.automate-e.svc.cluster.local:6379"
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: character
          configMap:
            name: book-e-character
---
# Workers — 2 replicas, scalable. Process messages from Redis queue.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-e-worker
  namespace: automate-e
  labels:
    app: book-e-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-e-worker
  template:
    metadata:
      labels:
        app: book-e-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/stig-johnny/automate-e:a31e1f54fccf5727c353df2a8da6075b847e7bf1
          imagePullPolicy: Always
          command: ["node", "src/worker.js"]
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: discord-bot-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: anthropic-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: book-e-secrets
                  key: database-url
            - name: REDIS_URL
              value: "redis://redis.automate-e.svc.cluster.local:6379"
          volumeMounts:
            - name: character
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: character
          configMap:
            name: book-e-character
